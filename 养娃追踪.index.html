                free: ['No routine this month (booster DTaP at 6y)'],
                paid: ['Influenza', 'Optional MenAC booster']
            },
            reactions: {
                normal: ['Mild soreness at site', 'Transient low fever'],
                danger: ['High fever (≥39°C)', 'Severe allergy', 'Lethargy']
            },
            growth: {
                range: 'Length 105-112cm | Weight 16-20kg',
                milestone: 'Writes simple letters/numbers correctly, jumps rope continuously, rides balance bike, shares and cooperates with friends',
                height: 108.5,
                weight: 18
            },
            illness: {
                list: [{
                    name: 'Dental caries',
                    care: 'Brush twice daily with fluoride toothpaste, limit sugar, regular fluoride varnish.',
                    danger: 'Severe toothache / gum abscess → see dentist'
                }, {
                    name: 'Vision issues (myopia/astigmatism screening)',
                    care: 'Outdoor activity 2h/day, screen time ≤1h/day, regular eye exams.',
                    danger: 'Significant vision decline / frequent squinting → see ophthalmologist'
                }]
            },
            firstAid: {
                list: [{
                    name: 'Cuts / bleeding',
                    action: 'Rinse with running water, apply direct pressure with clean gauze for 5-10 min, then disinfect with iodine.',
                    emergency: 'Deep wound / length >1cm / irregular edges / embedded foreign body → suturing needed'
                }, {
                    name: 'Drowning / water inhalation',
                    action: 'If conscious, pat back to expel water; if unconscious, lay on side, check breathing.',
                    emergency: 'No breathing / no response → start CPR and call 120'
                }]
            },
            psychology: {
                theme: 'Confidence and social skills',
                behavior: 'Proud of completing simple tasks, enjoys friendships and forms “circles”, begins to understand gender.',
                support: 'Give specific praise (“Great job tying your shoes!”), provide cooperative play opportunities, respect child’s friendship choices.'
            },
            safety: {
                items: [
                    'Teach child not to talk to or go with strangers, establish a “safe circle” list',
                    'Always supervise swimming (within arm’s reach), even with floaties',
                    'Label and lock all dangerous items (alcohol, medicines, cleaners)',
                    'Set a “safe word” for emergencies to identify trusted persons'
                ]
            },
            games: {
                list: [
                    { name: 'Balance bike / scooter', desc: 'Practice balance bike or scooter to improve balance and leg strength.' },
                    { name: 'Cooperative games', desc: 'Play “two-person three-legged” or “pass the ball” to foster teamwork and social skills.' }
                ]
            },
            food: {
                schedule: 'Full adult diet, with variety and balanced nutrition, limit snacks and sugary drinks.',
                amount: '3 meals + snack, about 2/3 of adult portion, milk 200ml.',
                allergy: 'Continue to watch for reactions to new foods, though overall risk is lower.'
            }
        }];

        // ===== DOM references =====
        const homePage = document.getElementById('homePage');
        const detailPage = document.getElementById('detailPage');
        const cardGrid = document.getElementById('cardGrid');
        const searchInput = document.getElementById('searchInput');
        const resultCount = document.getElementById('resultCount');
        const noResult = document.getElementById('noResult');
        const detailAge = document.getElementById('detailAge');
        const detailContent = document.getElementById('detailContent');
        const backBtn = document.getElementById('backBtn');
        let chartInstance = null;

        // ===== Render cards with filter =====
        function renderCards(filterText = '') {
            const lower = filterText.toLowerCase().trim();
            let filtered = stages;
            if (lower) {
                filtered = stages.filter(s =>
                    s.age.toLowerCase().includes(lower) ||
                    s.sub.toLowerCase().includes(lower) ||
                    s.keywords.some(k => k.toLowerCase().includes(lower))
                );
            }
            if (filtered.length === 0) {
                cardGrid.innerHTML = '';
                noResult.style.display = 'block';
                resultCount.textContent = '0 stages found';
                return;
            }
            noResult.style.display = 'none';
            resultCount.textContent = `${filtered.length} stages`;

            cardGrid.innerHTML = filtered.map((s) => `
                <div class="card-item" data-id="${s.id}">
                    <div class="icon-img">${s.icon}</div>
                    <h3>${s.age}</h3>
                    <div class="sub">${s.sub}</div>
                </div>
            `).join('');

            document.querySelectorAll('.card-item').forEach(el => {
                el.addEventListener('click', function() {
                    const id = parseInt(this.dataset.id);
                    const stage = stages.find(s => s.id === id);
                    if (stage) showDetail(stage);
                });
            });
        }

        // ===== Show detail =====
        function showDetail(d) {
            if (!d) return;
            detailAge.innerHTML = `${d.age} <small>${d.sub}</small>`;

            const topHtml = `
                <div class="detail-grid-top">
                    <div class="info-card">
                        <h4><i class="fas fa-tint"></i> Feeding</h4>
                        <ul>
                            <li><span class="label">Milk</span><span class="value">${d.milk}</span></li>
                            <li><span class="label">Formula Brands</span><span class="value">${d.formulaBrands}</span></li>
                        </ul>
                    </div>
                    <div class="info-card">
                        <h4><i class="fas fa-running"></i> Activities / Early learning</h4>
                        <ul>
                            <li><span class="label">Recommended</span><span class="value">${d.activity}</span></li>
                            <li><span class="label">Duration</span><span class="value">30–60 min/day</span></li>
                        </ul>
                    </div>
                    <div class="info-card">
                        <h4><i class="fas fa-moon"></i> Sleep</h4>
                        <ul>
                            <li><span class="label">Total</span><span class="value">${d.sleep}</span></li>
                            <li><span class="label">Night</span><span class="value">~9–11 hours</span></li>
                        </ul>
                    </div>
                </div>
            `;

            const vaccineHtml = `
                <div class="wide-card">
                    <h4><i class="fas fa-syringe"></i> Vaccination Schedule</h4>
                    <div class="vaccine-grid">
                        <div class="vaccine-col free">
                            <h5><span class="badge-free">Free</span> Routine (EPI)</h5>
                            <ul>${d.vaccines.free.map(item => `<li>${item}</li>`).join('')}</ul>
                        </div>
                        <div class="vaccine-col paid">
                            <h5><span class="badge-paid">Paid</span> Optional</h5>
                            <ul>${d.vaccines.paid.map(item => `<li>${item}</li>`).join('')}</ul>
                        </div>
                    </div>
                </div>
            `;

            const reactionHtml = `
                <div class="wide-card">
                    <h4><i class="fas fa-heartbeat"></i> Post‑vaccination observation</h4>
                    <div class="reaction-grid">
                        <div class="reaction-col">
                            <h5><span class="badge-normal">Normal</span> No need to see doctor (resolves 1-3 days)</h5>
                            <ul>${d.reactions.normal.map(item => `<li>${item}</li>`).join('')}</ul>
                        </div>
                        <div class="reaction-col danger">
                            <h5><span class="badge-danger">Emergency</span> Seek immediate care</h5>
                            <ul>${d.reactions.danger.map(item => `<li>${item}</li>`).join('')}</ul>
                        </div>
                    </div>
                </div>
            `;

            const growthHtml = `
                <div class="wide-card">
                    <h4><i class="fas fa-chart-line"></i> Growth & Development</h4>
                    <div class="growth-grid">
                        <div class="growth-col">
                            <h5 style="font-size:15px; font-weight:600; margin-bottom:12px; color:#1a4a7a;">
                                <i class="fas fa-ruler-combined" style="color:#2a7de1;"></i> Reference Range
                            </h5>
                            <div class="data-item"><span class="label">Length</span><span class="value">${d.growth.range.split('|')[0].trim()}</span></div>
                            <div class="data-item"><span class="label">Weight</span><span class="value">${d.growth.range.split('|')[1].trim()}</span></div>
                            ${d.growth.range.includes('Head') ? `<div class="data-item"><span class="label">Head</span><span class="value">${d.growth.range.split('|')[2].trim()}</span></div>` : ''}
                        </div>
                        <div class="growth-col">
                            <h5 style="font-size:15px; font-weight:600; margin-bottom:12px; color:#1a4a7a;">
                                <i class="fas fa-star" style="color:#f1c40f;"></i> Milestones
                            </h5>
                            <ul class="milestone-list">
                                ${d.growth.milestone.split('、').map(item => `<li>${item}</li>`).join('')}
                            </ul>
                        </div>
                    </div>
                </div>
                <div class="chart-container">
                    <h4><i class="fas fa-chart-simple"></i> Growth curves (current stage highlighted)</h4>
                    <div class="chart-wrapper">
                        <canvas id="growthChart"></canvas>
                    </div>
                </div>
            `;

            const illnessHtml = `
                <div class="wide-card">
                    <h4><i class="fas fa-thermometer-half"></i> Common Illness Care</h4>
                    <div class="illness-grid">
                        <div class="illness-col">
                            ${d.illness.list.map(item => `
                                <div class="illness-item">
                                    <strong><i class="fas fa-exclamation-circle" style="color:#2a7de1;"></i> ${item.name}</strong>
                                    <p><span style="color:#27ae60; font-weight:500;">Care:</span> ${item.care}</p>
                                    <p class="danger-sign"><i class="fas fa-triangle-exclamation"></i> When to see doctor: ${item.danger}</p>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;

            const firstAidHtml = `
                <div class="wide-card">
                    <h4><i class="fas fa-bolt" style="color:#e67e22;"></i> First Aid</h4>
                    <div class="firstaid-grid">
                        <div class="firstaid-col">
                            ${d.firstAid.list.map(item => `
                                <div class="aid-item">
                                    <strong><i class="fas fa-hand-holding-heart" style="color:#e67e22;"></i> ${item.name}</strong>
                                    <p><span style="font-weight:500;">Action:</span> ${item.action}</p>
                                    <p class="emergency"><i class="fas fa-exclamation-triangle"></i> Emergency: ${item.emergency}</p>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;

            const psychHtml = `
                <div class="wide-card">
                    <h4><i class="fas fa-brain" style="color:#8e44ad;"></i> Psychological Development</h4>
                    <div class="psych-grid">
                        <div class="psych-item"><strong>🧠 Theme</strong><p>${d.psychology.theme}</p></div>
                        <div class="psych-item"><strong>👀 Typical behavior</strong><p>${d.psychology.behavior}</p></div>
                        <div class="psych-item"><strong>🤝 Parental support</strong><p>${d.psychology.support}</p></div>
                    </div>
                </div>
            `;

            const safetyHtml = `
                <div class="wide-card">
                    <h4><i class="fas fa-shield-alt" style="color:#2980b9;"></i> Safety Checklist</h4>
                    <div class="safety-grid">
                        ${d.safety.items.map(item => `
                            <div class="safety-item"><strong>🔍 Check</strong><p>${item}</p></div>
                        `).join('')}
                    </div>
                </div>
            `;

            const gamesHtml = `
                <div class="wide-card">
                    <h4><i class="fas fa-puzzle-piece" style="color:#27ae60;"></i> Play & Learning Games</h4>
                    <div class="games-grid">
                        ${d.games.list.map(item => `
                            <div class="game-item"><strong>🎯 ${item.name}</strong><p>${item.desc}</p></div>
                        `).join('')}
                    </div>
                </div>
            `;

            let foodHtml = '';
            if (d.food) {
                foodHtml = `
                    <div class="wide-card">
                        <h4><i class="fas fa-utensils"></i> Complementary Feeding</h4>
                        <div class="food-grid">
                            <div class="food-col"><h5><i class="fas fa-calendar-day"></i> What to eat</h5><p>${d.food.schedule}</p></div>
                            <div class="food-col"><h5><i class="fas fa-weight-scale"></i> How much</h5><p>${d.food.amount}</p></div>
                            <div class="food-col"><h5><i class="fas fa-shield-alt"></i> Allergy watch</h5><div class="highlight-box"><p>${d.food.allergy}</p></div></div>
                        </div>
                    </div>
                `;
            } else {
                foodHtml = `
                    <div class="wide-card">
                        <h4><i class="fas fa-utensils"></i> Complementary Feeding</h4>
                        <p style="color:#5e7a93; font-size:15px;">No solids needed at this stage; exclusive breastfeeding or formula.</p>
                    </div>
                `;
            }

            const bottomHtml = `
                <div class="wide-card" style="margin-bottom:0;">
                    <div class="inner-grid">
                        <div class="col">
                            <h5><i class="fas fa-diaper"></i> Diaper & Stool</h5>
                            <p><strong>Change frequency:</strong> ${d.diaperChange}</p>
                            <p><strong>Stool color:</strong><br>${d.stoolColor}</p>
                        </div>
                        <div class="col">
                            <h5><i class="fas fa-hand-holding-heart"></i> Stool (Breast vs Formula)</h5>
                            <p><span class="tag">Breast</span> ${d.breastStool}</p>
                            <p><span class="tag">Formula</span> ${d.formulaStool}</p>
                        </div>
                        <div class="col">
                            <h5><i class="fas fa-star"></i> Brand Recommendations</h5>
                            <p><strong>Diapers:</strong><br>${d.diaperBrands}</p>
                            <p><strong>Formula:</strong><br>${d.formulaBrands}</p>
                        </div>
                    </div>
                </div>
            `;

            detailContent.innerHTML = topHtml + vaccineHtml + reactionHtml + growthHtml + illnessHtml + firstAidHtml + psychHtml + safetyHtml + gamesHtml + foodHtml + bottomHtml;

            homePage.style.display = 'none';
            detailPage.style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });

            // ---- draw chart ----
            const labels = stages.map(s => s.age);
            const heights = stages.map(s => s.growth.height);
            const weights = stages.map(s => s.growth.weight);
            const ctx = document.getElementById('growthChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Height (cm)',
                        data: heights,
                        borderColor: '#2a7de1',
                        backgroundColor: 'rgba(42, 125, 225, 0.1)',
                        tension: 0.3,
                        pointBackgroundColor: labels.map((_, idx) =>
                            stages[idx].id === d.id ? '#e74c3c' : '#2a7de1'
                        ),
                        pointBorderColor: labels.map((_, idx) =>
                            stages[idx].id === d.id ? '#e74c3c' : '#2a7de1'
                        ),
                        pointRadius: labels.map((_, idx) =>
                            stages[idx].id === d.id ? 7 : 3
                        ),
                        borderWidth: 2,
                        fill: false,
                    }, {
                        label: 'Weight (kg)',
                        data: weights,
                        borderColor: '#e67e22',
                        backgroundColor: 'rgba(230, 126, 34, 0.1)',
                        tension: 0.3,
                        pointBackgroundColor: labels.map((_, idx) =>
                            stages[idx].id === d.id ? '#c0392b' : '#e67e22'
                        ),
                        pointBorderColor: labels.map((_, idx) =>
                            stages[idx].id === d.id ? '#c0392b' : '#e67e22'
                        ),
                        pointRadius: labels.map((_, idx) =>
                            stages[idx].id === d.id ? 7 : 3
                        ),
                        borderWidth: 2,
                        fill: false,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'top',
                            labels: { usePointStyle: true, boxWidth: 10, padding: 16 }
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    let label = context.dataset.label || '';
                                    let val = context.parsed.y;
                                    return label + ': ' + val + (context.dataset.label.includes('cm') ? ' cm' : ' kg');
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: false,
                            grid: { color: 'rgba(0,0,0,0.05)' },
                            title: { display: true, text: 'Value' }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { maxRotation: 30, font: { size: 10 } }
                        }
                    }
                }
            });
        }

        function goHome() {
            detailPage.style.display = 'none';
            homePage.style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
            if (chartInstance) { chartInstance.destroy();
                chartInstance = null; }
        }

        backBtn.addEventListener('click', goHome);
        searchInput.addEventListener('input', function() { renderCards(this.value); });

        renderCards();
        homePage.style.display = 'block';
        detailPage.style.display = 'none';
    </script>
</body>
</html>
